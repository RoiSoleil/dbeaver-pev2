name: Build
on:
   push:
      branches:
      - main
permissions:
   contents: write
jobs:
   build:
      runs-on: ubuntu-latest
      services:
         postgres:
            image: postgres:16
            env:
               POSTGRES_DB: dbeaver_test
               POSTGRES_USER: test
               POSTGRES_PASSWORD: test
            ports:
               - 5432:5432
            options: >-
               --health-cmd pg_isready
               --health-interval 10s
               --health-timeout 5s
               --health-retries 5
      steps:
      -  name: Checkout
         uses: actions/checkout@v5
      -  name: Set up JDK
         uses: actions/setup-java@v5
         with:
            distribution: temurin
            java-version: 21
      -  name: Setup Maven
         uses: stCarolas/setup-maven@v5
         with:
            maven-version: 3.9.11
      -  name: Install WebKit for SWT Browser
         run: sudo apt-get update && sudo apt-get install -y libwebkit2gtk-4.1-dev
      -  name: Initialize test database
         run: |
            sudo apt-get install -y postgresql-client
            PGPASSWORD=test psql -h localhost -U test -d dbeaver_test \
              -f bundles/org.eclipse.dbeaver-pev2.tests/schema.sql
      -  name: Set up cache
         uses: actions/cache@v4.2.4
         with:
            path: ~/.m2/repository
            key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
            restore-keys: |
              ${{ runner.os }}-maven-
      -  name: Build
         run: |-
            Xvfb :99 -screen 0 1920x1080x24 &
            sleep 2
            export DISPLAY=:99
            mvn clean install
         shell: bash
      -  name: Release
         uses: "marvinpinto/action-automatic-releases@latest"
         with:
             repo_token: "${{ secrets.GITHUB_TOKEN }}"
             automatic_release_tag: "latest"
             prerelease: true
             title: "Development Build"
             files: |
               ./update-site/org.eclipse.dbeaver-pev2/target/org.eclipse.dbeaver-pev2.updatesite-*-SNAPSHOT.zip
      -  name: Publish p2 update site
         env:
            ACTIONS_TOKEN: ${{ secrets.ACTIONS_TOKEN }}
         run: |-
            git clone --branch update-site https://github.com/RoiSoleil/dbeaver-pev2
            cd dbeaver-pev2
            cd latest
            git config user.name "RoiSoleil"
            git config user.email "helios.gilles@gmail.com"
            rm -fr *
            cp -r ../../update-site/org.eclipse.dbeaver-pev2/target/repository/* .
            git add .
            git commit -m "New version of the update site"
            git push -f https://RoiSoleil:$ACTIONS_TOKEN@github.com/RoiSoleil/dbeaver-pev2 update-site
         shell: bash