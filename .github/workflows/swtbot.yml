name: SWTBot Tests
on:
  push:
    branches:
    - main
  pull_request:
    branches:
    - main
permissions:
  contents: write
jobs:
  swtbot-tests:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v5
    - name: Set up JDK 21
      uses: actions/setup-java@v5
      with:
        distribution: temurin
        java-version: 21
    - name: Setup Maven
      uses: stCarolas/setup-maven@v5
      with:
        maven-version: 3.9.11
    - name: Install WebKit for SWT Browser
      run: sudo apt-get update && sudo apt-get install -y libwebkit2gtk-4.1-dev
    - name: Set up cache
      uses: actions/cache@v4.2.4
      with:
        path: ~/.m2/repository
        key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
        restore-keys: |
          ${{ runner.os }}-maven-
    - name: Run SWTBot tests in Xvfb
      run: |-
        Xvfb :99 -screen 0 1920x1080x24 &
        sleep 2
        export DISPLAY=:99
        mvn clean verify \
          -Pswtbot-tests \
          -Dpev2.test=true
    - name: Upload test reports
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-reports
        path: |-
          **/target/surefire-reports/
          **/screenshots/
    - name: Upload Eclipse workspace log
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: eclipse-metadata
        path: ~/.eclipse/
